<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMR Supermarket Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body { background-color: #1a1d20; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #2b3035; border: none; color: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .camera-feed { width: 100%; border-radius: 8px; border: 2px solid #495057; background-color: #000; min-height: 300px; }
        .status-badge { font-size: 0.9rem; padding: 5px 12px; border-radius: 20px; }
        .btn-shelf { transition: all 0.3s; height: 60px; font-weight: bold; margin-bottom: 10px; }
        .btn-shelf:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .product-item { cursor: pointer; transition: 0.2s; border-bottom: 1px solid #3d4246; padding: 10px; }
        .product-item:hover { background-color: #3d4246; }
        .cart-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.9rem; border-bottom: 1px solid #444; }
        #product-list { height: 350px; overflow-y: auto; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="fas fa-robot me-2"></i> AMR SUPERMARKET ASSISTANT</span>
        <div class="d-flex">
            <span id="connection-status" class="badge bg-danger">Disconnected</span>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-eye me-2"></i>Live AI Vision</h5>
                    <span id="robot-state" class="badge bg-secondary status-badge">OFFLINE</span>
                </div>
                <div class="card-body p-1 text-center">
                    <img id="video-stream" src="" class="camera-feed" alt="Đang chờ luồng video từ robot...">
                </div>
            </div>

            <div class="card">
                <div class="card-header"><h5><i class="fas fa-map-marker-alt me-2"></i>Điều khiển Kệ hàng</h5></div>
                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-4"><button onclick="navTo('A')" class="btn btn-outline-primary w-100 btn-shelf">Kệ A<br><small>Sữa & Nước</small></button></div>
                        <div class="col-4"><button onclick="navTo('B')" class="btn btn-outline-success w-100 btn-shelf">Kệ B<br><small>Bánh kẹo</small></button></div>
                        <div class="col-4"><button onclick="navTo('C')" class="btn btn-outline-warning w-100 btn-shelf">Kệ C<br><small>Rau củ</small></button></div>
                        <div class="col-4"><button onclick="navTo('D')" class="btn btn-outline-danger w-100 btn-shelf">Kệ D<br><small>Thịt cá</small></button></div>
                        <div class="col-4"><button onclick="navTo('E')" class="btn btn-outline-info w-100 btn-shelf">Kệ E<br><small>Đông lạnh</small></button></div>
                        <div class="col-4"><button onclick="navTo('F')" class="btn btn-outline-light w-100 btn-shelf">Kệ F<br><small>Mỹ phẩm</small></button></div>
                    </div>
                    <div class="mt-3">
                        <button onclick="stopRobot()" class="btn btn-danger w-100 fw-bold py-3"><i class="fas fa-hand-paper me-2"></i>DỪNG KHẨN CẤP</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-primary">
                    <h5 class="mb-0 text-white"><i class="fas fa-boxes me-2"></i>Sản phẩm tại <span id="current-shelf-label">...</span></h5>
                </div>
                <div class="card-body p-0" id="product-list">
                    <div class="text-center text-muted mt-5">
                        <i class="fas fa-shopping-basket fa-3x mb-3"></i>
                        <p>Robot chưa đến kệ hàng</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-shopping-cart me-2"></i>Giỏ hàng</h5>
                    <button class="btn btn-sm btn-outline-dark" onclick="clearCart()">Xóa hết</button>
                </div>
                <div class="card-body">
                    <div id="cart-items" style="min-height: 80px; max-height: 150px; overflow-y: auto;">
                        <p class="text-muted text-center">Giỏ hàng trống</p>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold mb-3">
                        <span>TỔNG CỘNG:</span>
                        <span id="cart-total" class="text-warning fs-5">0 VNĐ</span>
                    </div>
                    <button onclick="checkout()" class="btn btn-success w-100 py-3 fw-bold"><i class="fas fa-check-circle me-2"></i>THANH TOÁN</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 2. KHAI BÁO SOCKET DUY NHẤT VỚI CẤU HÌNH FIX LỖI 400/PROTOCOL
    const socket = io({
        transports: ['websocket'],
        upgrade: false
    });

    let currentCatalog = {};

    // 3. Xử lý Kết nối
    socket.on('connect', () => {
        console.log("✅ Connected to Server via Websocket");
        document.getElementById('connection-status').className = "badge bg-success";
        document.getElementById('connection-status').innerText = "Connected";
    });

    socket.on('disconnect', () => {
        console.log("❌ Mất kết nối");
        document.getElementById('connection-status').className = "badge bg-danger";
        document.getElementById('connection-status').innerText = "Disconnected";
    });

    // 4. Nhận ảnh từ product_detector.py
    socket.on('camera_frame', (data) => {
        if (data.image) {
            document.getElementById('video-stream').src = data.image;
        }
    });

    // 5. Trạng thái robot
    socket.on('robot_status', (data) => {
        const stateBadge = document.getElementById('robot-state');
        stateBadge.innerText = data.state || data.status;
        
        if(data.state === "AT_DESTINATION" || data.status === "CONFIRMED") {
            stateBadge.className = "badge bg-success status-badge";
            if (data.target) updateProductList(data.target);
        } else if(data.state === "MOVING") {
            stateBadge.className = "badge bg-warning text-dark status-badge";
        }
    });

    socket.on('cart_updated', (cartData) => {
        renderCart(cartData);
    });

    // Logic xử lý dữ liệu
    fetch('/api/products').then(res => res.json()).then(data => { currentCatalog = data; });
    refreshCart();

    function navTo(shelfId) {
        socket.emit('navigate_to_shelf', { shelf: shelfId });
        document.getElementById('product-list').innerHTML = `
            <div class="text-center mt-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2">Robot đang đi tới kệ ${shelfId}...</p>
            </div>`;
    }

    function stopRobot() {
        socket.emit('emergency_stop', {});
    }

    function updateProductList(shelfId) {
        if(!currentCatalog[shelfId]) return;
        document.getElementById('current-shelf-label').innerText = "Kệ " + shelfId;
        let html = '';
        currentCatalog[shelfId].forEach(item => {
            html += `
                <div class="product-item d-flex align-items-center" onclick="addToCart('${shelfId}', '${item.id}')">
                    <span class="fs-2 me-3">${item.emoji}</span>
                    <div class="flex-grow-1">
                        <div class="fw-bold">${item.name}</div>
                        <div class="text-info">${item.price.toLocaleString()} VNĐ</div>
                    </div>
                    <button class="btn btn-sm btn-primary"><i class="fas fa-cart-plus"></i></button>
                </div>`;
        });
        document.getElementById('product-list').innerHTML = html;
    }

    function addToCart(shelfId, productId) {
        const product = currentCatalog[shelfId].find(p => p.id === productId);
        fetch('/api/cart/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(product)
        }).then(res => res.json()).then(data => renderCart(data.cart));
    }

    function renderCart(cart) {
        let html = '';
        let total = 0;
        if (!cart || cart.length === 0) {
            html = '<p class="text-muted text-center">Giỏ hàng trống</p>';
        } else {
            cart.forEach(item => {
                html += `<div class="cart-item"><span>${item.emoji} ${item.name}</span><span class="fw-bold text-warning">${item.price.toLocaleString()} đ</span></div>`;
                total += item.price;
            });
        }
        document.getElementById('cart-items').innerHTML = html;
        document.getElementById('cart-total').innerText = total.toLocaleString() + ' VNĐ';
    }

    function refreshCart() {
        fetch('/api/cart').then(res => res.json()).then(cart => renderCart(cart));
    }

    function clearCart() {
        fetch('/api/cart/clear', {method: 'POST'}).then(() => renderCart([]));
    }

    function checkout() {
        if(confirm("Xác nhận thanh toán?")) {
            fetch('/api/robot/navigate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({shelf: 'CHECKOUT'})
            });
        }
    }
</script>
</body>
</html>
